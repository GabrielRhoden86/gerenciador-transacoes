name: CI - Gerenciador Transações

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📄 Copiar .env
        run: cp backend/.env.example backend/.env

      - name: 🔨 Build containers
        run: docker compose -f docker-compose.ci.yml build --no-cache

      - name: 🚀 Subir containers
        run: docker compose -f docker-compose.ci.yml up -d

      - name: ⏳ Esperar MySQL ficar pronto
        run: |
          until docker exec laravel-db mysqladmin ping -h"localhost" --silent; do
            sleep 2
          done

      - name: 📦 Instalar dependências
        run: docker exec laravel-app composer install

      - name: 🔐 Gerar APP_KEY
        run: docker exec laravel-app php artisan key:generate

      - name: 🛠 Rodar migrations + seed
        run: docker exec laravel-app php artisan migrate --seed

      - name: 🧪 Rodar testes com coverage
        run: docker exec laravel-app php artisan test --coverage

      - name: 🛑 Derrubar containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down