name: CI/CD - Gerenciador Transações

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # --- JOB 1: TESTES LARAVEL -----
  laravel-api:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          submodules: false 

      - name: 🔨 Build containers
        # CORREÇÃO: O nome do arquivo é docker-compose.yml (com hífen) !

        run: docker compose -f docker-compose.yml build --no-cache

      - name: 🚀 Subir containers
        run: docker compose -f docker-compose.yml up -d

     - name: 📄 Configurar .env e permissões
      run: |
        docker exec laravel-app cp .env.example .env
        docker exec -u root laravel-app chmod -R 777 storage bootstrap/cache

      - name: ⏳ Esperar MySQL ficar pronto
        run: |
          until docker exec laravel-db mysqladmin ping -h"localhost" --silent; do
            sleep 2
          done

      - name: 📦 Instalar dependências
        run: docker exec -u root laravel-app composer install --no-interaction --prefer-dist --no-scripts
      
      - name: 🛠 Otimizar e Discover
        run: |
          docker exec laravel-app php artisan package:discover --ansi
          docker exec laravel-app php artisan config:clear

      - name: 🛠 Rodar migrations + seed
        run: docker exec laravel-app php artisan migrate --seed

      - name: 🧪 Rodar testes com coverage
        run: docker exec laravel-app php artisan test --coverage

      - name: 🛑 Derrubar containers 
        if: always()
        run: docker compose -f docker-compose.yml down

  # --- JOB 3: DEPLOY REAL NA ORACLE CLOUD ---
  deploy:
    runs-on: ubuntu-latest
    #needs: [laravel-api, frontend-build] 
    needs: [laravel-api] 
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: 🚀 Deploy via SSH Nativo
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            cd /var/www/gerenciador-transacoes
            
            # Garante acesso ao socket do docker
            sudo chmod 666 /var/run/docker.sock || true
            
            echo "--- 📥 Atualizando código ---"
            git pull origin master
            
            echo "--- 🏗️ Build e Up na VPS ---"
            # Agora que o plugin foi instalado, usamos o comando moderno
            docker compose up -d --build
            
            echo "--- ⏳ Aguardando containers ---"
            sleep 10
            
            echo "--- 🚀 Laravel Commands ---"
            docker exec laravel-app php artisan migrate --force
            docker exec laravel-app php artisan config:cache
            docker exec laravel-app php artisan route:cache
            docker exec laravel-app php artisan view:cache
            
            echo "--- ✅ Sucesso total! ---"
          EOF