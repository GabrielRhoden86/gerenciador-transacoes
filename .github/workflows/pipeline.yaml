name: CI - Gerenciador Transações

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📄 Copiar .env
        run: cp backend/.env.example backend/.env

      - name: �� Build containers
        run: docker compose build --no-cache

      - name: 🚀 Subir containers
        run: docker compose up -d

      - name: ⏳ Aguardar banco iniciar
        run: sleep 15

      - name: 🔐 Gerar APP_KEY
        run: docker exec laravel-app php artisan key:generate

      - name: 📦 Instalar dependências
        run: docker exec laravel-app composer install

      - name: 🛠 Rodar migrations
        run: docker exec laravel-app php artisan migrate

      - name: 🌱 Rodar seed
        run: docker exec laravel-app php artisan db:seed

      - name: 🧪 Rodar testes com coverage
        run: docker exec laravel-app php artisan test --coverage

      - name: 🛑 Derrubar containers
        if: always()
        run: docker compose down
