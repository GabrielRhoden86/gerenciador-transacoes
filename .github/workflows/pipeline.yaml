name: CI/CD - Gerenciador Transações

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # --- JOB 1: TESTES BACKEND (PHP/Laravel) ---
  laravel-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔨 Build e Subir Containers (CI)
        # Usamos o docker-compose.ci.yml que você já tem
        run: |
          docker compose -f docker-compose.ci.yml build --no-cache
          docker compose -f docker-compose.ci.yml up -d

      - name: 📄 Configurar Laravel
        run: |
          cp backend/.env.example backend/.env
          docker exec -u root laravel-app chmod -R 777 storage bootstrap/cache
          docker exec laravel-app composer install --no-interaction --prefer-dist
          docker exec laravel-app php artisan key:generate

      - name: ⏳ Esperar MySQL ficar pronto
        run: |
          until docker exec laravel-db mysqladmin ping -h"localhost" --silent; do
            echo "Aguardando MySQL..."
            sleep 3
          done

      - name: 🛠 Migrations e Testes
        run: |
          docker exec laravel-app php artisan migrate --seed
          docker exec laravel-app php artisan test

      - name: 🛑 Derrubar containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  # --- JOB 2: TESTE/BUILD FRONTEND (Node/Vuetify) ---
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Instalar e Buildar
        run: |
          cd frontend
          npm install
          npm run build # Garante que o código Vue/Vuetify não tem erros de sintaxe ou tipos
