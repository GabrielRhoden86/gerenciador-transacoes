services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel-app
    deploy:
      resources:
        limits:
          memory: 512M
    #volumes:
    #  - ./backend:/var/www/html   NÃO USAR VOLUME EM PRODUÇÃO VAI GERAR PROBLEMAS DE PERMISSÕES E PERFORMANCE
    depends_on:
      - db
    networks:
      - app-network
    #dns:
      #- 8.8.8.8
      #- 1.1.1.1

  webserver:
    image: nginx:alpine
    container_name: laravel-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: laravel-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gerenciador
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge